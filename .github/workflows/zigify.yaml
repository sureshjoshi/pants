name: Testing stuff
on:
  push:
    branches:
      - cargo-zig
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  do-a-thing:
    name: Doing a thing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: |-
            3.14

      - name: Grab them deps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::notice::PATH=$PATH"
          echo "::notice::GITHUB_PATH=$GITHUB_PATH"
          
          # TODO: Add SHA/size checks
          # TODO: Move these somewhere easily cacheable
          
          rustup target add aarch64-unknown-linux-gnu
          
          PROTOC_ZIP="protoc-34.1-linux-x86_64.zip"
          gh release download v34.1 --repo protocolbuffers/protobuf --pattern $PROTOC_ZIP --dir /tmp/
          unzip /tmp/$PROTOC_ZIP -d "$HOME/.local/"
          
          ZIG_VERSION="zig-x86_64-linux-0.15.2"
          ZIG_ARCHIVE="$ZIG_VERSION.tar.xz"
          curl -v -L "https://ziglang.org/download/0.15.2/$ZIG_ARCHIVE" -o "/tmp/$ZIG_ARCHIVE"
          tar xf "/tmp/$ZIG_ARCHIVE" --directory "$HOME/.local/bin"
          echo "$HOME/.local/bin/$ZIG_VERSION" >> "$GITHUB_PATH"
          
          # TODO: Version this - need at least (0.22.1) for some aws-ls-rc issues
          # TODO: Use pre-builts?
          cargo install --locked cargo-zigbuild
          
          echo "::notice::PATH=$PATH"
          echo "::notice::GITHUB_PATH=$GITHUB_PATH"
          
          echo "::notice::zig=$(zig --version)"
          echo "::notice::cargo-zig=$(cargo-zigbuild --version)"
          echo "::notice::protoc=$(protoc --version)"
      
      - name: Install aarch python deps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # TODO: Set as output path
          PY_AARCH_DIR="/tmp/python-aarch"
          mkdir -p $PY_AARCH_DIR
          PBS_VERSION="cpython-3.14.3+20260325-aarch64-unknown-linux-gnu-install_only_stripped"
          PBS_ARCHIVE="$PBS_VERSION.tar.gz"

          gh release download 20260325 --repo astral-sh/python-build-standalone --pattern $PBS_ARCHIVE --dir /tmp/
          tar xf "/tmp/$PBS_ARCHIVE" --directory $PY_AARCH_DIR --strip-components=1
          echo "::notice::AARCH_DIR=$(ls $PY_AARCH_DIR)"

      - name: Try compiling
        env:
          PYO3_CROSS_PYTHON_VERSION: "3.14"
          AWS_LC_SYS_NO_JITTER_ENTROPY: "1"
          RUST_FLAGS: "-L /tmp/python-aarch/lib"
        run: |
          cargo zigbuild --manifest-path ./src/rust/Cargo.toml --release --target aarch64-unknown-linux-gnu

      - name: Upload stuff
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v5
        with:
          name: engine
          path: ./src/rust/target/release/*
          retention-days: 1
