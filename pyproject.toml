[tool.coverage.run]
omit = [
  # pants/engine/internals tests
  "preludes/bad.py",
  # from testprojects/src/python/vcs_test/
  "tables.py",
  # While BUILD files are Python, during testing we create/inject/munge and do
  # all sorts of things with them that is hard to track
  "BUILD",
]

[tool.mypy]
namespace_packages = true
explicit_package_bases = true
mypy_path = "src/python:tests/python:testprojects/src/python"
plugins = "mypy_typing_asserts.mypy_plugin,pants.ng.subsystem_mypy_plugin"

no_implicit_optional = true
implicit_reexport = false
strict_equality = true

warn_unused_configs = true
warn_unused_ignores = true
warn_return_any = true
warn_redundant_casts = true
warn_unreachable = true

pretty = true
show_column_numbers = true
show_error_context = true
show_traceback = true

[[tool.mypy.overrides]]
module = [
  "botocore",
  "bs4",
  "chevron",
  "colors",
  "dockerfile",
  "fasteners",
  "freezegun",
  "gnupg",
  "hdrh",
  "hdrh.histogram",
  "ijson.*",
  "nodesemver",
  "pex.*",
  "psutil",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = ["platform_specific_behavior"]

[tool.ruff]
# Exclusions were copied from [tool.black]
exclude = [".git", ".mypy_cache", ".pants.d", "dist/"]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = [
  "I", # https://docs.astral.sh/ruff/rules/#isort-i
  "UP", # https://docs.astral.sh/ruff/rules/#pyupgrade-up (update Python code to `target-version`)
  "YTT", # https://docs.astral.sh/ruff/rules/#flake8-2020-ytt
  "ISC", # https://docs.astral.sh/ruff/rules/#flake8-implicit-str-concat-isc
]

# UP040/UP046/UP047:  Cost-benefit unclear, see https://github.com/python/cpython/issues/114159
ignore = [
  # non-pep585-annotation: Use {to} instead of {from} for type annotation. Note: (lots of churn)
  "UP006",
  # non-pep604-annotation-union: Use X | Y for type annotations. Note: Many buried, non-auto-fixable unions
  "UP007",
  # native-literals: Unnecessary {literal_type} call (rewrite as a literal). Note: Replaces `int(42)` in tests, breaking call-by-type and implicitly
  "UP018",
  # printf-string-formatting: Use format specifiers instead of percent format. Note: Two string replacements that are not auto-fixable
  "UP031",
  # deprecated-import: Import from {target} instead: {names}. Note: Replaces `DefaultDict` with `collections.defaultdict` (lots of churn).
  "UP035",
  # outdated-version-block: Version block is outdated for minimum Python version. Note: Outdated version check (in rule_visitor for Python 3.8)
  "UP036",
  # non-pep695-type-alias: Type alias {name} uses {type_alias_method} instead of the type keyword. Note: Cost-benefit unclear, see https://github.com/python/cpython/issues/114159
  "UP040",
  # non-pep695-generic-class: Generic class {name} uses Generic subclass instead of type parameters. Note: Cost-benefit unclear, see https://github.com/python/cpython/issues/114159
  "UP046",
  # non-pep695-generic-function: Generic function {name} should use type parameters. Note: Cost-benefit unclear, see https://github.com/python/cpython/issues/114159
  "UP047",
  # explicit-string-concatenation: Explicitly concatenated string should be implicitly concatenated. TODO: 9 errors that can be auto-fixed.
  "ISC003", 
]
external = ["PNT20"]

[tool.ruff.lint.isort]
known-first-party = ["internal_plugins", "pants", "pants_test", "python_constant"]
